name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_AUDIT_VERSION: "0.22.2"

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test --workspace --verbose --locked

      - name: Benchmark report (cost/gas regression guardrails)
        run: cargo test --package xelma-contract cost_benchmarks --locked -- --nocapture

      - name: Snapshot drift detection
        run: |
          if [ -d "contracts/test_snapshots" ] && ls contracts/test_snapshots/*.snap 1>/dev/null 2>&1; then
            echo "--- Snapshot drift check ---"
            echo "Snapshot golden files exist. To regenerate intentionally:"
            echo "  ./scripts/update_snapshots.sh"
            echo ""
            echo "If you did not intend to change snapshots, check for accidental"
            echo "storage or event mutations in your branch."
            echo "---"
          else
            echo "No snapshot golden files to check."
          fi

      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  contract-build:
    name: Contract Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
            ${{ runner.os }}-cargo-

      - name: Build contract (release)
        run: cargo build --target wasm32-unknown-unknown --release --package xelma-contract --locked

      - name: Check WASM artifact exists
        run: |
          if [ ! -f "target/wasm32-unknown-unknown/release/xelma_contract.wasm" ]; then
            echo "Error: WASM file not found"
            exit 1
          fi
          ls -lh target/wasm32-unknown-unknown/release/xelma_contract.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/xelma_contract.wasm
          retention-days: 7

  bindings-test:
    name: Bindings Tests
    runs-on: ubuntu-latest
    needs: contract-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bindings/package-lock.json

      - name: Install dependencies
        working-directory: bindings
        run: npm ci

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/

      - name: Run source-level parity and error tests
        working-directory: bindings
        run: npm run test:parity && npm run test:errors

      - name: Run vitest WASM integration suite
        working-directory: bindings
        env:
          WASM_PATH: ${{ github.workspace }}/target/wasm32-unknown-unknown/release/xelma_contract.wasm
        run: npm run test:wasm

  bindings-build:
    name: Bindings Build
    runs-on: ubuntu-latest
    needs: contract-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: bindings
        run: npm ci

      - name: Build TypeScript bindings
        working-directory: bindings
        run: npm run build

      - name: Lint TypeScript bindings
        working-directory: bindings
        run: npm run lint

      - name: Check build artifacts
        run: |
          if [ ! -f "bindings/dist/index.js" ] || [ ! -f "bindings/dist/index.d.ts" ]; then
            echo "Error: Build artifacts not found"
            exit 1
          fi
          echo "index.js exists"
          echo "index.d.ts exists"

      - name: Upload bindings artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-dist
          path: bindings/dist/
          retention-days: 7

  parity-check:
    name: Parity Check
    runs-on: ubuntu-latest
    needs: [contract-build, bindings-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/

      - name: Download bindings artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-dist
          path: bindings/dist/

      - name: Verify WASM and bindings compatibility
        run: |
          echo "Checking WASM file..."
          ls -lh target/wasm32-unknown-unknown/release/xelma_contract.wasm

          echo "Checking bindings..."
          ls -lh bindings/dist/

          echo "Verifying TypeScript types exist..."
          if grep -q "export.*Client" bindings/dist/index.d.ts; then
            echo "Client export found in type definitions"
          else
            echo "Client export not found"
            exit 1
          fi

          if grep -q "export.*BetSide" bindings/dist/index.d.ts; then
            echo "BetSide export found in type definitions"
          else
            echo "BetSide export not found"
            exit 1
          fi

          echo "Running ABI drift checking script..."
          cd bindings
          npm ci
          npm run test:parity && npm run test:errors

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: wasm32-unknown-unknown

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-
            ${{ runner.os }}-cargo-

      - name: Generate coverage report (JSON)
        run: cargo llvm-cov --all-features --workspace --json --output-path coverage.json --locked

      - name: Generate coverage report (HTML)
        run: cargo llvm-cov --all-features --workspace --html --output-dir coverage-report --locked

      - name: Generate coverage report (lcov)
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info --locked

      - name: Check coverage thresholds
        run: |
          echo "=== Coverage Threshold Check ==="

          # Extract line coverage for contract.rs
          # cargo-llvm-cov JSON format: .data[].files[].filename / .summary.line.percent
          CONTRACT_COVERAGE=$(jq -r '[.data[].files[] | select(.filename | endswith("contracts/src/contract.rs")) | .summary.line.percent] | first // 0' coverage.json)

          if [ "$CONTRACT_COVERAGE" = "null" ] || [ -z "$CONTRACT_COVERAGE" ]; then
            echo "contract.rs coverage: NOT FOUND in report, defaulting to 0"
            CONTRACT_COVERAGE=0
          fi

          CONTRACT_COVERAGE_INT=${CONTRACT_COVERAGE%.*}
          CONTRACT_THRESHOLD=90

          echo "contract.rs line coverage: ${CONTRACT_COVERAGE}% (threshold: ${CONTRACT_THRESHOLD}%)"
          echo "CONTRACT_COVERAGE=${CONTRACT_COVERAGE}" >> $GITHUB_ENV

          if [ "$CONTRACT_COVERAGE_INT" -lt "$CONTRACT_THRESHOLD" ]; then
            echo "FAIL: contract.rs coverage ${CONTRACT_COVERAGE}% is below threshold ${CONTRACT_THRESHOLD}%"
            exit 1
          fi

          # Extract overall workspace line coverage
          OVERALL_COVERAGE=$(jq -r '.data[].totals.line.percent // 0' coverage.json 2>/dev/null || echo "0")
          OVERALL_COVERAGE_INT=${OVERALL_COVERAGE%.*}
          OVERALL_THRESHOLD=80

          echo "Overall workspace line coverage: ${OVERALL_COVERAGE}% (threshold: ${OVERALL_THRESHOLD}%)"
          echo "OVERALL_COVERAGE=${OVERALL_COVERAGE}" >> $GITHUB_ENV

          if [ "$OVERALL_COVERAGE_INT" -lt "$OVERALL_THRESHOLD" ]; then
            echo "FAIL: Overall coverage ${OVERALL_COVERAGE}% is below threshold ${OVERALL_THRESHOLD}%"
            exit 1
          fi

          echo "=== All coverage thresholds met ==="

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30

      - name: Upload lcov report
        uses: actions/upload-artifact@v4
        with:
          name: lcov-info
          path: lcov.info
          retention-days: 30

      - name: Post coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Overall Line Coverage | ${OVERALL_COVERAGE}% | 80% | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| contract.rs Line Coverage | ${CONTRACT_COVERAGE}% | 90% | ✅ |" >> $GITHUB_STEP_SUMMARY

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

  license-header-check:
    name: SPDX License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SPDX headers in contract source files
        run: |
          missing=0
          while IFS= read -r -d '' file; do
            if ! head -n 5 "$file" | grep -q 'SPDX-License-Identifier'; then
              echo "Missing header: $file"
              missing=$((missing + 1))
            fi
          done < <(find contracts/src -name '*.rs' -print0)

          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "FAIL: $missing file(s) are missing SPDX license headers."
            echo "Run 'scripts/add_spdx_headers.sh' to fix."
            exit 1
          fi
          echo "All contract source files have SPDX license headers."

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-audit-v2-${{ env.CARGO_AUDIT_VERSION }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-audit-v2-${{ env.CARGO_AUDIT_VERSION }}-
            ${{ runner.os }}-cargo-audit-v2-

      - name: Install cargo-audit
        run: |
          if command -v cargo-audit >/dev/null 2>&1; then
            echo "cargo-audit already available"
          else
            cargo install cargo-audit --version "${CARGO_AUDIT_VERSION}" --locked
          fi
          cargo audit --version

      - name: Run dependency vulnerability audit
        # Fails on any vulnerability with CVSS score >= 7.0 (high/critical).
        # Use --deny warnings to also surface advisory-level findings in CI output.
        run: cargo audit --deny warnings

      - name: Run security-oriented clippy lints
        # These lints catch common unsafe patterns beyond the default clippy set.
        run: |
          cargo clippy --workspace --all-targets --locked -- \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::integer_arithmetic \
            -W clippy::arithmetic_side_effects \
            -W clippy::cast_possible_truncation \
            -W clippy::cast_sign_loss \
            2>&1 | tee /tmp/clippy-security.txt
          # Surface the results; non-zero exit propagates naturally
          cat /tmp/clippy-security.txt

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [rust-test, contract-build, bindings-test, bindings-build, parity-check, coverage, format-check, license-header-check, security-audit]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
           if [ "${{ needs.rust-test.result }}" != "success" ] || \
              [ "${{ needs.contract-build.result }}" != "success" ] || \
              [ "${{ needs.bindings-test.result }}" != "success" ] || \
              [ "${{ needs.bindings-build.result }}" != "success" ] || \
              [ "${{ needs.parity-check.result }}" != "success" ] || \
              [ "${{ needs.coverage.result }}" != "success" ] || \
              [ "${{ needs.format-check.result }}" != "success" ] || \
              [ "${{ needs.license-header-check.result }}" != "success" ] || \
              [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            echo "Rust Tests: ${{ needs.rust-test.result }}"
            echo "Contract Build: ${{ needs.contract-build.result }}"
            echo "Bindings Tests: ${{ needs.bindings-test.result }}"
            echo "Bindings Build: ${{ needs.bindings-build.result }}"
            echo "Parity Check: ${{ needs.parity-check.result }}"
            echo "Code Coverage: ${{ needs.coverage.result }}"
            echo "Format Check: ${{ needs.format-check.result }}"
            echo "SPDX Headers: ${{ needs.license-header-check.result }}"
            echo "Security Audit: ${{ needs.security-audit.result }}"
            exit 1
          fi
          echo "All CI checks passed"
